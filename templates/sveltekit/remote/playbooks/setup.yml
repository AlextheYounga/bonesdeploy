---
- name: Site setup for bonesdeploy (SvelteKit)
  hosts: all
  become: true

  roles:
    - role: users
      tags: [users]

    - role: apparmor
      tags: [apparmor]

    - role: common
      tags: [common]

    - role: sveltekit_runtime
      tags: [sveltekit]

    - role: nginx
      tags: [nginx]

    - role: ssl
      tags: [ssl]

  post_tasks:
    - name: Display setup completion
      ansible.builtin.debug:
        msg: |
          Bones SvelteKit site setup completed.
          Deploy user: {{ deploy_user }}
          Service user: {{ service_user }}
          Group: {{ group }}
      tags: always
