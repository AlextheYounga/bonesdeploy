---
- name: Install Next.js global npm tools
  become_user: "{{ deploy_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="{{ nvm_dir }}"
    . "${NVM_DIR}/nvm.sh"
    npm install -g {{ next_global_npm_packages | join(' ') }}
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ deploy_user }}"
  tags: [next, npm]
