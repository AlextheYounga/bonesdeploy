[data]
remote_name = "production"
project_name = ""
host = ""
port = "22"
git_dir = "/home/git/<project_name>.git"
worktree = "/var/www/<project_name>"
branch = "master"

[permissions.defaults]
deploy = "git"
owner = "applications"
group = "www-data"
dir_mode = "750"
file_mode = "640"

[[permissions.paths]]
path = "tmp"
mode = "770"
recursive = true

[[permissions.paths]]
path = "log"
mode = "770"
recursive = true

[[permissions.paths]]
path = "storage"
mode = "770"
recursive = true

[[permissions.paths]]
path = "public/assets"
mode = "750"
recursive = true
