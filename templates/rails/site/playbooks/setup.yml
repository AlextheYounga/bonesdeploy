---
- name: Site setup for bonesdeploy (Rails)
  hosts: all
  become: true

  roles:
    - role: users
      tags: [users]

    - role: common
      tags: [common]

    - role: rails_runtime
      tags: [rails]

    - role: nginx
      tags: [nginx]

    - role: ssl
      tags: [ssl]

  post_tasks:
    - name: Display setup completion
      ansible.builtin.debug:
        msg: |
          Bones Rails site setup completed.
          Deploy user: {{ deploy_user }}
          Service user: {{ service_user }}
          Group: {{ group }}
      tags: always
