data:
  remote_name: 'production'
  project_name: ''
  host: ''
  port: '22'
  repo_path: '/home/git/<project_name>.git'
  project_root: '/srv/deployments/<project_name>'
  web_root: 'public'
  branch: 'master'

permissions:
  defaults:
    deploy_user: 'git'
    service_user: ''
    group: 'www-data'
    dir_mode: '750'
    file_mode: '640'
  paths:
    - path: 'dist'
      mode: '755'
      recursive: true
