[data]
remote_name = "production"
project_name = ""
host = ""
port = "22"
git_dir = "/home/git/<project_name>.git"
worktree = "/var/www/<project_name>"
branch = "master"

[permissions.defaults]
deploy_user = "git"
service_user = "applications"
group = "www-data"
dir_mode = "750"
file_mode = "640"

[[permissions.paths]]
path = ".output"
mode = "770"
recursive = true

[[permissions.paths]]
path = ".nuxt"
mode = "770"
recursive = true
