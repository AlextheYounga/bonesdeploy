---
- name: Install Laravel PHP repository prerequisites
  ansible.builtin.apt:
    name: "{{ laravel_php_sury_prerequisite_packages }}"
    state: present
    update_cache: true
  tags: [laravel, php, packages]

- name: Download Laravel PHP repository keyring package
  ansible.builtin.get_url:
    url: "{{ laravel_php_sury_keyring_package_url }}"
    dest: "{{ laravel_php_sury_keyring_package_path }}"
    mode: "0644"
    force: true
  tags: [laravel, php, packages]

- name: Install Laravel PHP repository keyring package
  ansible.builtin.apt:
    deb: "{{ laravel_php_sury_keyring_package_path }}"
    state: present
  tags: [laravel, php, packages]

- name: Add Laravel PHP apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ laravel_php_sury_keyring_path }}]
      https://packages.sury.org/php {{ ansible_distribution_release }} main
    filename: php
    state: present
    update_cache: true
  tags: [laravel, php, packages]
