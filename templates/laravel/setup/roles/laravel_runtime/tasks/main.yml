---
- name: Resolve PHP version
  ansible.builtin.set_fact:
    laravel_php_version_resolved: "{{ laravel_php_version }}"
  tags: [laravel, php]

- name: Set PHP-FPM pool config path
  ansible.builtin.set_fact:
    laravel_php_fpm_pool_config_path: "/srv/conf/{{ project_name }}/php-fpm.conf"
  tags: [laravel, php]

- name: Ensure conf directory exists
  ansible.builtin.file:
    path: "{{ paths.conf_root }}"
    state: directory
    owner: root
    group: "{{ group }}"
    mode: "0750"
  tags: [laravel, php]

- name: Ensure storage directories exist
  ansible.builtin.file:
    path: "{{ paths.current }}/{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ group }}"
    mode: "0775"
  loop:
    - storage/logs
    - storage/framework/cache
    - storage/framework/sessions
    - storage/framework/views
  tags: [laravel, php]

- name: Deploy PHP-FPM pool config
  ansible.builtin.template:
    src: php-fpm-pool.conf.j2
    dest: "{{ laravel_php_fpm_pool_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm
  tags: [laravel, php]

- name: Deploy PHP-FPM systemd service
  ansible.builtin.template:
    src: site-php-fpm.service.j2
    dest: "/etc/systemd/system/{{ project_name }}-php-fpm.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  tags: [laravel, php]

- name: Deploy PHP-FPM AppArmor profile
  ansible.builtin.template:
    src: site-php-fpm-profile.j2
    dest: "/etc/apparmor.d/bonesdeploy-{{ project_name }}-php-fpm"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload AppArmor profiles
    - Restart php-fpm
  tags: [laravel, php]

- name: Load PHP-FPM AppArmor profile
  ansible.builtin.command:
    argv:
      - apparmor_parser
      - -r
      - -T
      - -W
      - "/etc/apparmor.d/bonesdeploy-{{ project_name }}-php-fpm"
  changed_when: true
  tags: [laravel, php]

- name: Enable and start per-project PHP-FPM service
  ansible.builtin.systemd:
    name: "{{ project_name }}-php-fpm.service"
    enabled: true
    state: started
    daemon_reload: true
  tags: [laravel, php]
