---
runtime_role: laravel_runtime
setup_label: Laravel
laravel_php_version: "8.3"
setup_pre_packages_enabled: true
laravel_php_sury_prerequisite_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - lsb-release
laravel_php_sury_keyring_package_url: https://packages.sury.org/debsuryorg-archive-keyring.deb
laravel_php_sury_keyring_package_path: /tmp/debsuryorg-archive-keyring.deb
laravel_php_sury_keyring_path: /usr/share/keyrings/deb.sury.org-php.gpg
setup_apt_packages:
  - build-essential
  - ca-certificates
  - curl
  - git
  - rsync
  - sudo
  - nginx
  - apparmor
  - apparmor-utils
  - certbot
  - ufw
  - "php{{ laravel_php_version }}"
  - "php{{ laravel_php_version }}-cli"
  - "php{{ laravel_php_version }}-fpm"
  - "php{{ laravel_php_version }}-bcmath"
  - "php{{ laravel_php_version }}-curl"
  - "php{{ laravel_php_version }}-gd"
  - "php{{ laravel_php_version }}-intl"
  - "php{{ laravel_php_version }}-mbstring"
  - "php{{ laravel_php_version }}-mysql"
  - "php{{ laravel_php_version }}-sqlite3"
  - "php{{ laravel_php_version }}-xml"
  - "php{{ laravel_php_version }}-zip"
  - composer
