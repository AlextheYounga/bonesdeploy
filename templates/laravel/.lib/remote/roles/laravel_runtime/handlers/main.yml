---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reload AppArmor profiles
  ansible.builtin.command:
    cmd: apparmor_parser -r -T -W /etc/apparmor.d/bonesdeploy-{{ project_name }}-php-fpm
  changed_when: true

- name: Restart php-fpm
  ansible.builtin.systemd:
    name: "{{ project_name }}-php-fpm.service"
    state: restarted
