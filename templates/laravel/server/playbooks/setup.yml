---
- name: Server setup for bonesdeploy (Laravel)
  hosts: all
  become: true

  roles:
    - role: users
      tags: [users]

    - role: common
      tags: [common]

    - role: laravel_runtime
      tags: [laravel]

    - role: nginx
      tags: [nginx]

    - role: ssl
      tags: [ssl]

    - role: runtime
      tags: [runtime]

  post_tasks:
    - name: Display setup completion
      ansible.builtin.debug:
        msg: |
          Bones Laravel server setup completed.
          Deploy user: {{ deploy_user }}
          Service user: {{ service_user }}
          Group: {{ group }}
      tags: always
