---

- name: Validate SSL inputs
  ansible.builtin.assert:
    that:
      - ssl_domain | length > 0
      - ssl_email | length > 0
    fail_msg: "ssl_domain and ssl_email are required when ssl_enabled=true"
  when: ssl_enabled
  tags: [ssl]

- name: Ensure certbot is installed
  ansible.builtin.apt:
    name: "{{ ssl_certbot_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ssl_enabled
  tags: [ssl, packages]

- name: Render nginx HTTP challenge config
  ansible.builtin.template:
    src: "{{ nginx_site_template_path }}"
    dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  vars:
    nginx_server_name: "{{ ssl_domain }}"
    nginx_ssl_enabled: false
  when: ssl_enabled
  tags: [ssl]

- name: Validate nginx configuration before certbot
  ansible.builtin.command: nginx -t
  changed_when: false
  when: ssl_enabled
  tags: [ssl]

- name: Reload nginx before certbot challenge
  ansible.builtin.service:
    name: "{{ nginx_service_name }}"
    state: reloaded
  when: ssl_enabled
  tags: [ssl]

- name: Obtain or renew certificate
  ansible.builtin.command:
    argv:
      - certbot
      - certonly
      - --non-interactive
      - --agree-tos
      - --email
      - "{{ ssl_email }}"
      - --webroot
      - -w
      - "{{ nginx_placeholder_root }}"
      - -d
      - "{{ ssl_domain }}"
      - --keep-until-expiring
  when: ssl_enabled
  tags: [ssl]

- name: Render nginx HTTPS config
  ansible.builtin.template:
    src: "{{ nginx_site_template_path }}"
    dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  vars:
    nginx_server_name: "{{ ssl_domain }}"
    nginx_ssl_enabled: true
    nginx_ssl_certificate_path: "{{ ssl_cert_path }}"
    nginx_ssl_certificate_key_path: "{{ ssl_key_path }}"
  when: ssl_enabled
  tags: [ssl]

- name: Validate nginx configuration after SSL enable
  ansible.builtin.command: nginx -t
  changed_when: false
  when: ssl_enabled
  tags: [ssl]

- name: Reload nginx with SSL configuration
  ansible.builtin.service:
    name: "{{ nginx_service_name }}"
    state: reloaded
  when: ssl_enabled
  tags: [ssl]
