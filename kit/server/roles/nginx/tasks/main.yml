---
- name: Install nginx
  ansible.builtin.apt:
    name: "{{ nginx_package_name }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [nginx, packages]

- name: Ensure placeholder root exists
  ansible.builtin.file:
    path: "{{ nginx_placeholder_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [nginx]

- name: Deploy placeholder page
  ansible.builtin.template:
    src: "{{ nginx_placeholder_template_path }}"
    dest: "{{ nginx_placeholder_root }}/index.html"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx]

- name: Deploy nginx site config
  ansible.builtin.template:
    src: "{{ nginx_site_template_path }}"
    dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx]

- name: Enable nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}.conf"
    state: link
    force: true
  notify: Reload nginx
  tags: [nginx]

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: nginx_disable_default_site
  notify: Reload nginx
  tags: [nginx]

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  tags: [nginx]

- name: Ensure nginx service is enabled and started
  ansible.builtin.service:
    name: "{{ nginx_service_name }}"
    enabled: true
    state: started
  tags: [nginx]
