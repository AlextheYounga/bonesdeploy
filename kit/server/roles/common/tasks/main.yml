---
# Common role main tasks

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_base_packages }}"
    state: present
  tags: [common, packages]

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
  when: common_nginx_enabled
  tags: [common, nginx]

- name: Enable and start nginx service
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  when: common_nginx_enabled
  notify: Reload nginx
  tags: [common, nginx]

- name: Install certbot and nginx plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when: common_certbot_enabled
  tags: [common, certbot]

- name: Install ctop (Docker monitoring tool)
  when: common_ctop_enabled
  tags: [common, ctop, docker]
  block:
    - name: Check if ctop is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/ctop
      register: common_ctop_binary

    - name: Set ctop architecture
      ansible.builtin.set_fact:
        common_ctop_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else 'armhf' }}"
      when: not common_ctop_binary.stat.exists

    - name: Download and install ctop
      ansible.builtin.get_url:
        url: "https://github.com/bcicen/ctop/releases/download/v0.7.7/ctop-0.7.7-linux-{{ common_ctop_arch }}"
        dest: /usr/local/bin/ctop
        mode: "0755"
      when: not common_ctop_binary.stat.exists

- name: Configure tmux
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ item }}/.tmux.conf"
    owner: "{{ item | basename }}"
    group: "{{ item | basename }}"
    mode: "0644"
  loop:
    - "{{ admin_home }}"
    - "{{ deploy_home }}"
  tags: [common, tmux]

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 52unattended-upgrades-local.j2
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
  when: common_unattended_upgrades_enabled
  notify: Restart unattended-upgrades
  tags: [common, security, unattended-upgrades]

- name: Enable automatic upgrades
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: common_unattended_upgrades_enabled
  notify: Restart unattended-upgrades
  tags: [common, security, unattended-upgrades]

- name: Enable and start unattended-upgrades service
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
  when: common_unattended_upgrades_enabled
  tags: [common, security, unattended-upgrades]

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: common_fail2ban_enabled
  notify: Restart fail2ban
  tags: [common, security]

- name: Ensure fail2ban jail.d directory exists
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: common_fail2ban_enabled
  tags: [common, security]

- name: Configure fail2ban sshd jail
  ansible.builtin.template:
    src: fail2ban-sshd.local.j2
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  when: common_fail2ban_enabled and common_fail2ban_sshd_enabled
  notify: Restart fail2ban
  tags: [common, security]
