---
- name: Remote setup for bonesdeploy
  hosts: all
  become: true

  roles:
    - role: users
      tags: [users]

    - role: apparmor
      tags: [apparmor]

    - role: common
      tags: [common]

    - role: nginx
      tags: [nginx]

    - role: ssl
      tags: [ssl]

  post_tasks:
    - name: Run bonesremote doctor as deploy user
      become_user: "{{ deploy_user }}"
      ansible.builtin.command:
        argv:
          - bonesremote
          - doctor
      environment:
        PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
      changed_when: false
      tags: [common, bonesremote]

    - name: Display setup completion
      ansible.builtin.debug:
        msg: |
          Bones remote setup completed.
          Deploy user: {{ deploy_user }}
          Service user: {{ service_user }}
          Group: {{ group }}
      tags: always
