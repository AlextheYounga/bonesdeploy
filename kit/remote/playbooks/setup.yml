---
- name: Remote setup for bonesdeploy
  hosts: all
  become: true

  vars_files:
    - "{{ playbook_dir }}/../vars/setup.yml"

  tasks:
    - name: Run users role
      ansible.builtin.include_role:
        name: users
      tags: [users]

    - name: Run AppArmor role
      ansible.builtin.include_role:
        name: apparmor
      tags: [apparmor]

    - name: Run common role
      ansible.builtin.include_role:
        name: common
        public: true
      tags: [common]

    - name: Run runtime role
      ansible.builtin.include_role:
        name: "{{ runtime_role }}"
      when: runtime_role | length > 0
      tags: [runtime]

    - name: Run nginx role
      ansible.builtin.include_role:
        name: nginx
      tags: [nginx]

    - name: Run ssl role
      ansible.builtin.include_role:
        name: ssl
      tags: [ssl]

  post_tasks:
    - name: Run bonesremote doctor as deploy user
      become_user: "{{ deploy_user }}"
      ansible.builtin.command:
        argv:
          - bonesremote
          - doctor
      environment:
        PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
      changed_when: false
      tags: [common, bonesremote]
