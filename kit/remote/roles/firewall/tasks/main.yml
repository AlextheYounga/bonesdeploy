---
- name: Apply UFW configuration
  ansible.builtin.shell: |
    set -euo pipefail

    {% if firewall_manage_ssh %}
      {% if firewall_ssh_allowed_cidrs | length == 0 %}
    ufw {{ 'limit' if firewall_ssh_rate_limit else 'allow' }} {{ firewall_ssh_port }}/tcp
      {% else %}
        {% for cidr in firewall_ssh_allowed_cidrs %}
    ufw {{ 'limit' if firewall_ssh_rate_limit else 'allow' }} from {{ cidr }} to any port {{ firewall_ssh_port }} proto tcp
        {% endfor %}
      {% endif %}
    {% endif %}

    {% for port in firewall_allowed_ports | reject('equalto', 'ssh') | list %}
    ufw allow {{ firewall_port_aliases[port] | default(port) }}/tcp
    {% endfor %}

    ufw --force default {{ firewall_default_incoming_policy }} incoming
    ufw --force default {{ firewall_default_outgoing_policy }} outgoing
    ufw --force enable
  args:
    executable: /bin/bash
  register: firewall_apply_result
  changed_when: firewall_apply_result.rc == 0
  when: firewall_enabled
  tags: [firewall, security]

- name: Check UFW status
  ansible.builtin.command: ufw status verbose
  register: firewall_ufw_status
  changed_when: false
  when: firewall_show_status
  tags: [firewall, security]

- name: Display UFW status
  ansible.builtin.debug:
    var: firewall_ufw_status.stdout_lines
  when: firewall_show_status
  tags: [firewall, security]
