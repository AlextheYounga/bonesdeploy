---
- name: Ensure bare repo parent directory exists
  ansible.builtin.file:
    path: "{{ paths.repo_parent }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  tags: [common, git]

- name: Initialize bare git repo
  become_user: "{{ deploy_user }}"
  ansible.builtin.command:
    argv:
      - git
      - init
      - --bare
      - "{{ paths.repo }}"
  args:
    creates: "{{ paths.repo_head }}"
  tags: [common, git]

- name: Ensure bare repo bones directory exists
  ansible.builtin.file:
    path: "{{ paths.repo_bones }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  tags: [common, git]

- name: Ensure project root parent directory is traversable by deploy hooks
  ansible.builtin.file:
    path: "{{ paths.project_root_parent }}"
    state: directory
    owner: root
    group: root
    mode: "0711"
  tags: [common, placeholder]

- name: Ensure placeholder release directory exists
  ansible.builtin.file:
    path: "{{ paths.placeholder_web_root }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ group }}"
    mode: "0750"
  tags: [common, placeholder]

- name: Seed placeholder index page into initial release
  ansible.builtin.template:
    src: "{{ common_placeholder_template_path }}"
    dest: "{{ paths.placeholder_index }}"
    owner: "{{ service_user }}"
    group: "{{ group }}"
    mode: "0640"
  tags: [common, placeholder]

- name: Point current symlink at placeholder release
  ansible.builtin.file:
    src: "{{ paths.placeholder_release }}"
    dest: "{{ paths.current }}"
    state: link
    force: true
  tags: [common, placeholder]

- name: Wait for rustup and cargo install
  ansible.builtin.async_status:
    jid: "{{ common_rustup_job.ansible_job_id }}"
  register: common_rustup_result
  until: common_rustup_result.finished
  retries: 180
  delay: 10
  when: common_rustup_job is defined and common_rustup_job.ansible_job_id is defined
  tags: [common, bonesremote]

- name: Verify cargo installation
  ansible.builtin.command:
    argv:
      - "{{ cargo_binary_path }}"
      - --version
  changed_when: false
  tags: [common, bonesremote]

- name: Check for bonesremote binary
  ansible.builtin.stat:
    path: "{{ bonesremote_binary_path }}"
  register: common_bonesremote_binary
  tags: [common, bonesremote]

- name: Start bonesremote binary install
  ansible.builtin.command:
    argv:
      - "{{ cargo_binary_path }}"
      - install
      - --root
      - "{{ bonesremote_install_root }}"
      - --git
      - "{{ bonesremote_repo_url }}"
      - bonesremote
  when: not common_bonesremote_binary.stat.exists
  async: 1800
  poll: 0
  register: common_bonesremote_job
  tags: [common, bonesremote]

- name: Wait for bonesremote binary install
  ansible.builtin.async_status:
    jid: "{{ common_bonesremote_job.ansible_job_id }}"
  register: common_bonesremote_result
  until: common_bonesremote_result.finished
  retries: 180
  delay: 10
  when: common_bonesremote_job is defined and common_bonesremote_job.ansible_job_id is defined
  tags: [common, bonesremote]

- name: Run bonesremote init
  ansible.builtin.command:
    argv:
      - bonesremote
      - init
      - --deploy-user
      - "{{ deploy_user }}"
  environment:
    PATH: "{{ paths.usr_local_bin }}:{{ ansible_facts['env']['PATH'] }}"
  tags: [common, bonesremote]
