---
- name: Remote setup for bonesdeploy
  hosts: all
  become: true

  vars_files:
    - "{{ playbook_dir }}/../vars/setup.yml"

  tasks:
    - name: Run template-specific pre-package setup
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/pre_packages.yml"
      when: setup_pre_packages_enabled | default(false)
      tags: [setup, packages]

    - name: Install setup apt packages
      ansible.builtin.apt:
        name: "{{ setup_apt_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600
      tags: [setup, packages]

    - name: Run common rustup bootstrap
      ansible.builtin.include_role:
        name: common
        tasks_from: rustup
      tags: [common, bonesremote]

    - name: Run users role
      ansible.builtin.include_role:
        name: users
      tags: [users]

    - name: Run firewall role
      ansible.builtin.include_role:
        name: firewall
      tags: [firewall]

    - name: Run common role
      ansible.builtin.include_role:
        name: common
        public: true
      tags: [common]
