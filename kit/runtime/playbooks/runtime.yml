---
- name: Remote runtime for bonesdeploy
  hosts: all
  become: true

  vars_files:
    - "{{ playbook_dir }}/../../runtime.yaml"

  tasks:
    - name: Install runtime apt packages
      ansible.builtin.apt:
        name: "{{ runtime_apt_packages | default([]) }}"
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: runtime_apt_packages | default([]) | length > 0
      tags: [runtime, packages]

    - name: Run runtime role
      ansible.builtin.include_role:
        name: "{{ runtime_role }}"
        public: true
      when: runtime_role | default('') | length > 0
      tags: [runtime]

    - name: Run AppArmor role
      ansible.builtin.include_role:
        name: apparmor
      tags: [apparmor]

    - name: Run nginx role
      ansible.builtin.include_role:
        name: nginx
        public: true
      tags: [nginx]

  post_tasks:
    - name: Run bonesremote doctor as deploy user
      become_user: "{{ deploy_user }}"
      ansible.builtin.command:
        argv:
          - bonesremote
          - doctor
      environment:
        PATH: "{{ paths.usr_local_bin }}:{{ ansible_facts['env']['PATH'] }}"
      changed_when: false
      tags: [runtime, doctor]
