---
- name: Create per-project runtime group
  ansible.builtin.group:
    name: "{{ project_name }}"
    system: true
  tags: [nginx]

- name: Add service user to project group
  ansible.builtin.user:
    name: "{{ service_user }}"
    groups: "{{ project_name }}"
    append: true
  tags: [nginx]

- name: Ensure socket directory exists
  ansible.builtin.file:
    path: "{{ paths.runtime_socket_dir }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ group }}"
    mode: "0750"
  tags: [nginx]

- name: Ensure conf directory exists
  ansible.builtin.file:
    path: "{{ paths.conf_root }}"
    state: directory
    owner: root
    group: "{{ group }}"
    mode: "0750"
  tags: [nginx]

- name: Deploy per-site nginx config
  ansible.builtin.template:
    src: "{{ nginx_site_template_path }}"
    dest: "{{ paths.site_nginx_config }}"
    owner: root
    group: "{{ group }}"
    mode: "0640"
  tags: [nginx]

- name: Deploy per-site nginx systemd service
  ansible.builtin.template:
    src: "{{ nginx_site_service_template_path }}"
    dest: "{{ paths.systemd_site_nginx_service }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  tags: [nginx]

- name: Deploy router nginx config
  ansible.builtin.template:
    src: "{{ nginx_router_template_path }}"
    dest: "{{ paths.nginx_site_available }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx]

- name: Enable router nginx site
  ansible.builtin.file:
    src: "{{ paths.nginx_site_available }}"
    dest: "{{ paths.nginx_site_enabled }}"
    state: link
    force: true
  notify: Reload nginx
  tags: [nginx]

- name: Disable default nginx site
  ansible.builtin.file:
    path: "{{ paths.nginx_default_site_enabled }}"
    state: absent
  when: nginx_disable_default_site
  notify: Reload nginx
  tags: [nginx]

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  tags: [nginx]

- name: Ensure nginx service is enabled and started
  ansible.builtin.service:
    name: "{{ nginx_service_name }}"
    enabled: true
    state: started
  tags: [nginx]

- name: Ensure per-site nginx service is enabled and started
  ansible.builtin.systemd:
    name: "{{ paths.systemd_site_nginx_service | basename | regex_replace('\\.service$', '') }}"
    enabled: true
    state: started
    daemon_reload: true
  tags: [nginx]
