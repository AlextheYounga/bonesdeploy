# User data goes here
data:
  port: '22'
  branch: 'master'
  deploy_on_push: true

  # live_root is the public path your web server points to.
  # It should remain a symlink to deploy_root/current.
  live_root: '/var/www/<project_name>'

  # deploy_root stores deployment/runtime data:
  # - build/workspace
  # - runtime/
  # - shared/
  # - current (symlink)
  deploy_root: '/srv/deployments/<project_name>'

# Permissions for deployment
permissions:
  defaults:
    deploy_user: 'git'
    service_user: '<project_name>'
    group: 'www-data'
    dir_mode: '750'
    file_mode: '640'

releases:
  # Number of old releases to keep after each successful activation.
  keep: 5

  # Paths that are persisted in deploy_root/shared and symlinked into each release.
  shared_paths:
    - '.env'
    - 'storage'

# Optional runtime launcher settings (only needed for service/landlock-managed apps).
# runtime:
#   command:
#     - '/usr/bin/node'
#     - 'server.js'
#   working_dir: '.'
#   writable_paths: []

ssl:
  # Optional TLS values used by `bonesdeploy server ssl`.
  # You can leave these empty and pass --domain/--email on the command.
  enabled: false
  domain: ''
  email: ''
