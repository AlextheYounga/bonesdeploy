template: nuxt
web_root: '.output/public'
permissions:
  defaults:
    dir_mode: '750'
    file_mode: '640'
  paths:
    - path: '.output'
      mode: '770'
      recursive: true
    - path: '.nuxt'
      mode: '770'
      recursive: true
shared:
  paths:
    - path: '.env'
      type: 'file'
    - path: 'storage'
      type: 'dir'