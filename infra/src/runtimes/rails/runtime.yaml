template: rails
web_root: public
permissions:
  defaults:
    dir_mode: '750'
    file_mode: '640'
  paths:
    - path: 'tmp'
      mode: '770'
      recursive: true
    - path: 'log'
      mode: '770'
      recursive: true
    - path: 'storage'
      mode: '770'
      recursive: true
    - path: 'public/assets'
      mode: '750'
      recursive: true
shared:
  paths:
    - path: '.env'
      type: 'file'
    - path: 'storage'
      type: 'dir'