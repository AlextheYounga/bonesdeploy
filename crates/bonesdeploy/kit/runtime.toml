# ── Identity ──────────────────────────────────────────────
# Injected by `bonesdeploy init` — edit to customise.
runtime_user = ""
runtime_group = ""
release_group = ""

# ── File permissions ──────────────────────────────────────
# Applied during `bonesremote release promote`.
# mode is an octal permission mask (e.g. 750, 640, 770).
# Set recursive = true for directories whose contents also
# need the same mode.
[permissions]
paths = [{ path = "*", type = "dir", mode = "750" }, { path = "*", type = "file", mode = "640" }]
