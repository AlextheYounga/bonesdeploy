[app]
# Project identity
project_name = "mysite"
remote_name = "production"

# Server connection
host = ''
ssh_user = "root"
port = '22'

# Domain & TLS
domain = ''
preview_domain = ""
email = ''
ssl_enabled = false

# Deploy behavior
branch = 'master'
deploy_on_push = false
releases = 5

# Build-time environment variables
# We keep your build environment separate from your runtime environment for security.
# Declare env vars here which can be injected into the build container and used in build scripts.
[build]
vars = [
# "NEXT_PUBLIC_API_URL",
]


[runtime]
runtime_user = ""
runtime_group = ""
release_group = ""

# File permissions
# Applied during `bonesremote release promote`.
# mode is an octal permission mask (e.g. 750, 640, 770).
# Set recursive = true for directories whose contents also
# need the same mode.
[runtime.permissions]
paths = [
	{ path = "*", type = "dir", mode = "750" },
	{ path = "*", type = "file", mode = "640" }
]
