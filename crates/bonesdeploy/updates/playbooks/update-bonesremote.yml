---
- name: Update bonesremote binary
  hosts: all
  become: true

  vars:
    bonesremote_repo_url: ""
    bonesremote_target_version: ""
    bonesremote_install_root: "/usr/local"
    bonesremote_binary_path: "/usr/local/bin/bonesremote"
    bonesremote_managed_projects_root: ""
    cargo_binary_path: "/root/.cargo/bin/cargo"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - bonesremote_repo_url is defined and bonesremote_repo_url | length > 0
          - bonesremote_target_version is defined and bonesremote_target_version | length > 0
          - bonesremote_install_root is defined and bonesremote_install_root | length > 0
          - bonesremote_binary_path is defined and bonesremote_binary_path | length > 0
          - bonesremote_managed_projects_root is defined and bonesremote_managed_projects_root | length > 0
          - cargo_binary_path is defined and cargo_binary_path | length > 0
        fail_msg: "bonesremote repo, target version, install root, binary path, managed project root, and cargo path are required"
        quiet: true

    - name: Ensure install root exists
      ansible.builtin.file:
        path: "{{ bonesremote_install_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install bonesremote from master
      ansible.builtin.command:
        argv:
          - "{{ cargo_binary_path }}"
          - install
          - --root
          - "{{ bonesremote_install_root }}"
          - --git
          - "{{ bonesremote_repo_url }}"
          - --force
          - bonesremote
      changed_when: true

    - name: Verify installed bonesremote version
      ansible.builtin.command:
        argv:
          - "{{ bonesremote_binary_path }}"
          - version
      changed_when: false
      register: version_check

    - name: Assert binary version matches target
      ansible.builtin.assert:
        that:
          - version_check.stdout is search(bonesremote_target_version)
        fail_msg: "Binary version mismatch: expected {{ bonesremote_target_version }}, got {{ version_check.stdout }}"
        quiet: true

    - name: Discover managed projects
      ansible.builtin.find:
        paths: "{{ bonesremote_managed_projects_root }}"
        file_type: directory
        depth: 1
      register: managed_projects

    - name: Run bonesremote doctor for each project
      ansible.builtin.command:
        argv:
          - "{{ bonesremote_binary_path }}"
          - doctor
        chdir: "{{ item.path }}"
      loop: "{{ managed_projects.files }}"
      changed_when: false
      when: managed_projects.matched > 0
