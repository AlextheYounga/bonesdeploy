# User data goes here
data:
  port: '22'
  branch: 'master'
  deploy_on_push: true

  # Optional path overrides. Leave commented out to use the defaults.
  # project_root defaults to /srv/deployments/<project_name>
  #   Stores deployment state: build/, releases/, shared/, current.
  # project_root: '/srv/deployments/<project_name>'
  #
  # repo_path defaults to /home/git/<project_name>.git
  # repo_path: '/home/git/<project_name>.git'
  #
  # web_root defaults to public
  # web_root: 'public'

# Permissions for deployment
permissions:
  defaults:
    deploy_user: 'git'
    service_user: '<project_name>'
    group: 'www-data'
    dir_mode: '750'
    file_mode: '640'

releases:
  # Number of old releases to keep after each successful activation.
  keep: 5

  # Files persisted in shared/ and symlinked into each release.
  shared_files:
    - '.env'

  # Directories persisted in shared/ and symlinked into each release.
  shared_dirs:
    - 'storage'

ssl:
  # Optional TLS values used by `bonesdeploy remote ssl`.
  # You can leave these empty and pass --domain/--email on the command.
  enabled: false
  domain: ''
  email: ''
