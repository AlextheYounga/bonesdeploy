template: nuxt
web_root: '.output/public'
permissions:
  defaults:
    dir_mode: '750'
    file_mode: '640'
  paths:
    - path: '.output'
      mode: '770'
      recursive: true
    - path: '.nuxt'
      mode: '770'
      recursive: true
shared:
  shared_files:
  - '.env'
  shared_dirs:
  - storage