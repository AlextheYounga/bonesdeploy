template: laravel
web_root: public
permissions:
  defaults:
    dir_mode: '750'
    file_mode: '640'
  paths:
    - path: 'storage'
      mode: '770'
      recursive: true
    - path: 'bootstrap/cache'
      mode: '770'
      recursive: true
    - path: 'database'
      mode: '770'
      recursive: false
      type: 'dir'
    - path: 'database/database.sqlite'
      mode: '660'
      recursive: false
      type: 'file'
shared:
  shared_files:
  - '.env'
  shared_dirs:
  - storage