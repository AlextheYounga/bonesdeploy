# ── Runtime identity ──────────────────────────────────────
# Do not edit `template` — it links this config to the
# Nuxt build and deploy scripts.
template = "nuxt"

# ── Web root ──────────────────────────────────────────────
# Nuxt's nitro server outputs static assets under
# .output/public.
web_root = ".output/public"

# ── File permissions ──────────────────────────────────────
# .output/ and .nuxt/ need group-write so the runtime user
# can write cache and build artifacts.
[permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = ".output", type = "dir", mode = "770", recursive = true },
  { path = ".nuxt", type = "dir", mode = "770", recursive = true },
]
