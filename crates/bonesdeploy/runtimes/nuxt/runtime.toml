template = "nuxt"
web_root = ".output/public"
build_image = "docker.io/library/node:24-bookworm"

[permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = ".output", type = "dir", mode = "770", recursive = true },
  { path = ".nuxt", type = "dir", mode = "770", recursive = true },
]
