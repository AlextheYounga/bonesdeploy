# ── Build-time environment variables ──────────────────────
# Declare which env var names from shared/.env should be
# injected into the build container.
#
# Nuxt inlines NUXT_PUBLIC_* vars into the client bundle at
# build time, so any NUXT_PUBLIC_* var your app uses must be
# listed here. Server-only vars without the prefix do NOT
# need to be listed.
#
# Values come from `bonesdeploy secrets push` —
# do not put values here.
#
vars = [
  # "NUXT_PUBLIC_API_URL",
  # "NUXT_PUBLIC_SITE_NAME",
]
