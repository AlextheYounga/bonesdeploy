# ── Build-time environment variables ──────────────────────
# Declare which env var names from shared/.env should be
# injected into the build container.
#
# Laravel does not inline environment variables at build time.
# Add var names here only if your build scripts need them.
#
# Values come from `bonesdeploy secrets push` —
# do not put values here.
#
vars = [
]

# ── Build-time configuration constants ────────────────────
# Top-level keys (except `vars`) are injected as same-named
# environment variables into the build container.
# Non-secret, safe to commit.
#
# php_version must match the value in runtime.toml — they
# serve different lifecycle phases (build vs. runtime) but
# must refer to the same PHP major.minor release.
php_version = "8.5"
