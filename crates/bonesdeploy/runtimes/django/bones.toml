[runtime]
template = "django"
web_root = "public"

[runtime.permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = "static", type = "dir", mode = "750", recursive = true },
  { path = "media", type = "dir", mode = "770", recursive = true },
]

[runtime.shared]
paths = [
  { path = ".env", type = "file" },
  { path = "staticfiles", type = "dir" },
  { path = "media", type = "dir" },
]

[build]
vars = []
