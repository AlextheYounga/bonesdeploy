# ── Runtime identity ──────────────────────────────────────
# Do not edit `template` — it links this config to the
# Django build and deploy scripts.
template = "django"

# ── Web root ──────────────────────────────────────────────
# Static files are collected into static/ during build.
# Uploads go to media/ — writable at runtime.
web_root = "public"

# ── File permissions ──────────────────────────────────────
# static/ is read-only at runtime.
# media/ needs group-write for user uploads.
[permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = "static", type = "dir", mode = "750", recursive = true },
  { path = "media", type = "dir", mode = "770", recursive = true },
]

# ── Shared paths ──────────────────────────────────────────
# Persist across deploys via symlinks into shared/.
# staticfiles/ holds collected static files.
# media/ holds user uploads.
# .env is managed by `bonesdeploy secrets push`.
[shared]
paths = [
  { path = ".env", type = "file" },
  { path = "staticfiles", type = "dir" },
  { path = "media", type = "dir" },
]
