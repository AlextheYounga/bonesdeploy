# ── Runtime identity ──────────────────────────────────────
# Do not edit `template` — it links this config to the
# SvelteKit build and deploy scripts.
template = "sveltekit"

# ── Web root ──────────────────────────────────────────────
# SvelteKit's adapter-static or adapter-node outputs to
# build/ by default.
web_root = "build"

# ── File permissions ──────────────────────────────────────
# build/ needs group-write so the adapter can write
# server-side assets.
[permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = "build", type = "dir", mode = "770", recursive = true },
]

# ── Shared paths ──────────────────────────────────────────
# Persist across deploys via symlinks into shared/.
# .env is managed by `bonesdeploy secrets push`.
[shared]
paths = [
  { path = ".env", type = "file" },
]
