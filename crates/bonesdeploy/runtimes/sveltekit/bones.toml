[runtime]
template = "sveltekit"
web_root = "build"

[runtime.permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = "build", type = "dir", mode = "770", recursive = true },
]

[runtime.shared]
paths = [
  { path = ".env", type = "file" },
]

[build]
vars = []
