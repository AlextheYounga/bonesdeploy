[runtime]
template = "next"
web_root = "public"

[runtime.permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = ".next", type = "dir", mode = "770", recursive = true },
]

[build]
vars = ["NEXT_PUBLIC_API_URL", "NEXT_PUBLIC_SITE_NAME"]
