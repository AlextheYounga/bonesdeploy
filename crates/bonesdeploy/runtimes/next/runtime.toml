# ── Runtime identity ──────────────────────────────────────
# Do not edit `template` — it links this config to the
# Next.js build and deploy scripts.
template = "next"

# ── Web root ──────────────────────────────────────────────
# Directory inside the release that nginx serves.
# Next.js outputs static files + the standalone server here
# after `next build`.
web_root = "public"

# ── File permissions ──────────────────────────────────────
# Applied during `bonesremote release promote`.
# .next/ needs group-write so the runtime user can cache.
[permissions]
paths = [
  { path = "*", type = "dir", mode = "750" },
  { path = "*", type = "file", mode = "640" },
  { path = ".next", type = "dir", mode = "770", recursive = true },
]
