# Declare which env var names from shared/.env should be injected into
# the build container. Next.js inlines NEXT_PUBLIC_* vars into the client
# bundle at build time, so they must be available during `next build`.
#
# Variables without the NEXT_PUBLIC_ prefix are server-side only and
# do NOT need to be listed here.
#
# Values come from `bonesdeploy secrets push` — do not put values here.
#
vars = [
  # "NEXT_PUBLIC_API_URL",
  # "NEXT_PUBLIC_SITE_NAME",
]
